# Render deployment blueprint.
# A single full-stack Next.js web service (storefront + admin + API routes),
# backed by MongoDB Atlas (set DATABASE_URL manually).
#
# Runs entirely on Render's FREE plan — no card required.
# Redis is intentionally omitted: the app falls back to an in-memory cache when
# REDIS_URL is unset, which is fine for a single free instance. To add Redis
# later, create a Key Value instance and set REDIS_URL in the dashboard.
services:
  - type: web
    name: codshop
    runtime: node
    plan: free
    # --include=dev is required: NODE_ENV=production makes npm skip devDependencies,
    # but the build needs them (next, typescript, tailwindcss, postcss, autoprefixer).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0" # pin to Node 20 LTS (Next 14); avoid Render picking Node 26 from ">=20"
      - key: DATABASE_URL
        sync: false # set to your MongoDB Atlas URI in the dashboard
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
